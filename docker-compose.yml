services:
  # HAProxy Load Balancer (HTTP mode) - Use --profile loadbalancer
  haproxy_http:
    image: haproxy:latest
    container_name: clickhouse-loadbalancer-http
    hostname: haproxy
    profiles:
      - loadbalancer  # Only starts with --profile loadbalancer
      - all
    volumes:
      - ${PWD}/haproxy-http.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ${PWD}/certs:/usr/local/etc/haproxy/certs:ro
    ports:
      - "127.0.0.1:8123:8123"   # HTTP interface (load-balanced)
      - "127.0.0.1:9000:9000"   # Native TCP interface (load-balanced)
      - "127.0.0.1:8404:8404"   # HAProxy stats page (HTTP)
    depends_on:
      - clickhouse-01
      - clickhouse-02
      - clickhouse-03
      - clickhouse-04

  # HAProxy Load Balancer (HTTPS mode) - Use --profile tls
  haproxy_https:
    image: haproxy:latest
    container_name: clickhouse-loadbalancer-https
    hostname: haproxy
    profiles:
      - tls  # Only starts with --profile tls
    volumes:
      - ${PWD}/haproxy-https.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ${PWD}/certs:/usr/local/etc/haproxy/certs:ro
    ports:
      - "127.0.0.1:8123:8123"   # HTTP interface (backward compat)
      - "127.0.0.1:8443:8443"   # HTTPS interface (TLS termination)
      - "127.0.0.1:9000:9000"   # Native TCP interface (load-balanced)
      - "127.0.0.1:8404:8404"   # HAProxy stats page (HTTP)
      - "127.0.0.1:8405:8405"   # HAProxy stats page (HTTPS)
    depends_on:
      - clickhouse-01
      - clickhouse-02
      - clickhouse-03
      - clickhouse-04

  # Prometheus - Metrics collection and monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    hostname: prometheus
    profiles:
      - monitoring
      - all
    volumes:
      - ${PWD}/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"   # Prometheus web UI
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - clickhouse-01
      - clickhouse-02
      - clickhouse-03
      - clickhouse-04

  # Grafana - Visualization and dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    hostname: grafana
    profiles:
      - monitoring
      - all
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SECURITY_SECRET_KEY=${GF_SECURITY_SECRET_KEY}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ${PWD}/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "127.0.0.1:3000:3000"   # Grafana web UI
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - prometheus
      - clickhouse-01
      - clickhouse-02
      - clickhouse-03
      - clickhouse-04

  clickhouse-01:
    image: "clickhouse/clickhouse-server:latest"
    user: "101:101"
    container_name: clickhouse-01
    hostname: clickhouse-01
    profiles:
      - basic
      - monitoring
      - all
    volumes:
      - ${PWD}/fs/volumes/clickhouse-01/etc/clickhouse-server/config.d/config.xml:/etc/clickhouse-server/config.d/config.xml
      - ${PWD}/fs/volumes/clickhouse-01/etc/clickhouse-server/users.d/users.xml:/etc/clickhouse-server/users.d/users.xml
      - clickhouse-01-data:/var/lib/clickhouse
    ports:
      - "127.0.0.1:18123:8123"  # Direct access to node 1 (HTTP)
      - "127.0.0.1:19000:9000"  # Direct access to node 1 (TCP)
      - "127.0.0.1:19363:9363"  # Prometheus metrics
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      clickhouse-keeper-01:
        condition: service_healthy
      clickhouse-keeper-02:
        condition: service_healthy
      clickhouse-keeper-03:
        condition: service_healthy
  clickhouse-02:
    image: "clickhouse/clickhouse-server:latest"
    user: "101:101"
    container_name: clickhouse-02
    hostname: clickhouse-02
    profiles:
      - basic
      - all
      - monitoring
    volumes:
      - ${PWD}/fs/volumes/clickhouse-02/etc/clickhouse-server/config.d/config.xml:/etc/clickhouse-server/config.d/config.xml
      - ${PWD}/fs/volumes/clickhouse-02/etc/clickhouse-server/users.d/users.xml:/etc/clickhouse-server/users.d/users.xml
      - clickhouse-02-data:/var/lib/clickhouse
    ports:
      - "127.0.0.1:28123:8123"  # Direct access to node 2 (HTTP)
      - "127.0.0.1:29000:9000"  # Direct access to node 2 (TCP)
      - "127.0.0.1:29363:9363"  # Prometheus metrics
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      clickhouse-keeper-01:
        condition: service_healthy
      clickhouse-keeper-02:
        condition: service_healthy
      clickhouse-keeper-03:
        condition: service_healthy
  clickhouse-03:
    image: "clickhouse/clickhouse-server:latest"
    user: "101:101"
    container_name: clickhouse-03
    hostname: clickhouse-03
    profiles:
